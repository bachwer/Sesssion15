<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Discount</title>
    <style>
        body { font-family: Arial; background: #f5f5f5; }
        .container {
            width: 400px;
            margin: 100px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Giảm giá sản phẩm</h2>

    <form action="/admin/discount" method="post">
        <input type="text" name="category" placeholder="Nhập category (VD: Laptop)" required>
        <input type="number" name="discount" placeholder="Nhập % giảm" required>
        <button type="submit">Áp dụng</button>
    </form>
</div>

</body>
</html>
