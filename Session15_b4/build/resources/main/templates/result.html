<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Kết quả</title>
    <style>
        body { font-family: Arial; background: #f5f5f5; text-align: center; }
        .box {
            margin-top: 100px;
            padding: 20px;
            background: white;
            display: inline-block;
            border-radius: 10px;
        }
        .success { color: green; }
        .error { color: red; }
        a { display: block; margin-top: 20px; }
    </style>
</head>
<body>

<div class="box">
    <h2>Kết quả</h2>

    <p class="success" th:text="${message}"></p>
    <p class="error" th:text="${error}"></p>

    <a href="/admin/discount">← Quay lại</a>
</div>

</body>
</html>
